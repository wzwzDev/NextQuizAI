name: SonarCloud
on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarqube:
    name: SonarCloud
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: railway
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/railway
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Rebuild LightningCSS for Linux
        run: npm rebuild lightningcss
      - name: Create .env.test
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY || 'ci-openai-key' }}" >> .env.test
          echo "DATABASE_URL=${{ env.DATABASE_URL }}" >> .env.test
          echo "NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET || 'ci-nextauth-secret' }}" >> .env.test
          echo "NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL || 'http://localhost:3000' }}" >> .env.test
          echo "API_URL=${{ secrets.API_URL || 'http://localhost:3000' }}" >> .env.test
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID || 'ci-google-client-id' }}" >> .env.test
          echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET || 'ci-google-client-secret' }}" >> .env.test
          echo "DISABLE_SEMANTIC_GRADING=true" >> .env.test
      - name: Build project
        run: npm run build
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'ci-openai-key' }}
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-nextauth-secret' }}
          AUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-nextauth-secret' }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL || 'http://localhost:3000' }}
      - name: Run frontend tests and collect coverage
        run: npx jest --config jest.frontend.config.js --coverage --coverageDirectory=coverage-frontend
      - name: Prisma generate
        run: npx prisma generate
      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -uroot -proot && exit 0
            sleep 2
          done
          exit 1
      - name: Prisma migrate (test DB)
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
      - name: Run backend tests and collect coverage
        run: npx jest --config jest.backend.config.js --coverage --coverageDirectory=coverage-backend --runInBand
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          DOTENV_CONFIG_PATH: .env.test
      - name: Debug coverage files
        run: |
         ls -lh coverage-frontend
         ls -lh coverage-backend
      - name: Merge coverage reports
        run: |
          npx mkdirp coverage
          npx lcov-result-merger 'coverage-*/lcov.info' 'coverage/lcov.info'
      - name: Debug merged coverage
        run: |
          ls -lh coverage
          head -20 coverage/lcov.info
      - name: SonarCloud Scan
        if: success() && env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        with:
          args: >
            -Dsonar.projectKey=wzwzDev_NextQuizAI
            -Dsonar.organization=wzwzdev
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
